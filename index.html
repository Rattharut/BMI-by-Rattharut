<!DOCTYPE html>
<head>
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>BMI by North</title>
    <link rel="stylesheet" href="Reset.css">
    <link rel="stylesheet" href="main.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    
    <link href="https://fonts.googleapis.com/css2?family=Englebert&family=Playpen+Sans+Thai:wght@100..800&display=swap" rel="stylesheet"><link
    rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"

    href="https://fonts.googleapis.com/css2?family=Sriracha&display=swap" rel="stylesheet">
    
</head>

<body class="container">

<div class="Main animate__animated animate__fadeIn" >

<div class="Main">

<h1 class="BMI-main">โปรแกรมคำนวณ BMI</h1> 
<p class="The-BMI">ใส่ค่าน้ำหนัก - ส่วนสูงของคุณ</p>

<form action="result.html" method="GET">

    <input class="quiz-block blockEf" 
    type="number" name="w" step="0.1" placeholder="น้ำหนัก (กก.)" required>

    <input class="quiz-block blockEf"
    type="number" name="h" placeholder="ส่วนสูง (ซม.)" required>

    <button class="button" type="submit">Next</button>

</form>

<p class="Nub">BMI Calculator</p>

</div>

</body>
</html>
